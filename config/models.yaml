# Unified model registry — local HuggingFace models and cloud API models
# Used by core/model_loader.py

local_models:
  # Small models (no auth, fast testing)
  tinyllama:
    hf_path: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    params_b: 1.1
    requires_auth: false
  qwen2-1.5b:
    hf_path: "Qwen/Qwen2-1.5B-Instruct"
    params_b: 1.5
    requires_auth: false
  phi-2:
    hf_path: "microsoft/phi-2"
    params_b: 2.7
    requires_auth: false

  # Medium models (FP16)
  phi-3-mini:
    hf_path: "microsoft/Phi-3-mini-4k-instruct"
    params_b: 3.8
    requires_auth: false
  mistral-7b:
    hf_path: "mistralai/Mistral-7B-Instruct-v0.3"
    params_b: 7.2
    requires_auth: false
  qwen2.5-7b:
    hf_path: "Qwen/Qwen2.5-7B-Instruct"
    params_b: 7.6
    requires_auth: false
  llama3.1-8b:
    hf_path: "meta-llama/Llama-3.1-8B-Instruct"
    params_b: 8.0
    requires_auth: true

  # 14B models (8-bit quantization)
  qwen2.5-14b:
    hf_path: "Qwen/Qwen2.5-14B-Instruct"
    params_b: 14.2
    requires_auth: false
  deepseek-r1-14b:
    hf_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B"
    params_b: 14.2
    requires_auth: false

  # Extra-large models (4-bit NF4)
  mistral-nemo-12b:
    hf_path: "mistralai/Mistral-Nemo-Instruct-2407"
    params_b: 12.2
    requires_auth: false
  mistral-small-24b:
    hf_path: "mistralai/Mistral-Small-24B-Instruct-2501"
    params_b: 24.0
    requires_auth: false
  gemma2-27b:
    hf_path: "google/gemma-2-27b-it"
    params_b: 27.2
    requires_auth: false
  qwen2.5-32b:
    hf_path: "Qwen/Qwen2.5-32B-Instruct"
    params_b: 32.5
    requires_auth: false
  deepseek-r1-32b:
    hf_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
    params_b: 32.5
    requires_auth: false

api_models:
  openai:
    endpoint: "https://api.openai.com/v1/chat/completions"
    api_key_env: "OPENAI_API_KEY"
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-3.5-turbo
  anthropic:
    endpoint: "https://api.anthropic.com/v1/messages"
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      - claude-sonnet-4-20250514
      - claude-haiku-4-20250414
  gemini:
    endpoint: "https://generativelanguage.googleapis.com/v1beta/models"
    api_key_env: "GEMINI_API_KEY"
    models:
      - gemini-2.0-flash
      - gemini-1.5-pro
      - gemini-1.5-flash
  deepseek:
    endpoint: "https://api.deepseek.com/v1/chat/completions"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      - deepseek-chat
      - deepseek-reasoner
