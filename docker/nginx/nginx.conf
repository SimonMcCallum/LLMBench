worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide server version
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zones
    include /etc/nginx/snippets/rate-limit.conf;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # Timeouts — keep tight to limit slowloris
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # Limit request body size (no file uploads expected)
    client_max_body_size 1m;

    upstream app {
        server app:8080;
    }

    # --- HTTP: redirect to HTTPS ---
    server {
        listen 80;
        server_name _;

        # Allow HTTP for local/dev (comment out and uncomment redirect for production)
        # return 301 https://$host$request_uri;

        include /etc/nginx/snippets/security-headers.conf;

        location /static/ {
            alias /var/www/static/;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Admin login — strictest rate limit
        location = /vet/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin panel
        location /vet/ {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public quiz API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public quiz UI
        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block common scanner/exploit paths
        location ~ /\.(git|env|htaccess|htpasswd) {
            return 404;
        }
        location ~ /(wp-admin|wp-login|phpmyadmin|administrator|xmlrpc) {
            return 404;
        }
    }

    # --- HTTPS (uncomment when certs are in place) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name llm-bench.example.com;
    #
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     include /etc/nginx/snippets/security-headers.conf;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # (Copy all location blocks from the HTTP server above)
    # }
}
