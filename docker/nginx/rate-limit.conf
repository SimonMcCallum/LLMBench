# Login: 3 requests per minute per IP (strict brute-force protection)
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;

# Admin panel: 30 requests per minute per IP
limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

# Public API: 60 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# General page loads: 120 requests per minute per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;
