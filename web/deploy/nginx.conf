# nginx config for LLM-Bench quiz server
# Copy to /etc/nginx/sites-available/llm-bench and symlink to sites-enabled
#
# sudo ln -s /etc/nginx/sites-available/llm-bench /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name bench.simonmccallum.org.nz;  # LLM confidence calibration benchmark

    # Redirect HTTP to HTTPS (uncomment when SSL is set up)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve static files directly from nginx for performance
    location /static/ {
        alias /opt/llm-bench/web/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}

