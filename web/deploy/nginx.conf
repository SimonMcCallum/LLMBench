# nginx config for LLM-Bench quiz server
# Copy to /etc/nginx/sites-available/llm-bench and symlink to sites-enabled
#
# sudo ln -s /etc/nginx/sites-available/llm-bench /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Supports two deployment modes:
#   1. Subdomain:  bench.simonmccallum.org.nz/  (use the "server" block below)
#   2. Subpath:    simonmccallum.org.nz/bench/   (add the "location /bench/" block
#                  to your existing server config for simonmccallum.org.nz)

# Option 1: Subdomain deployment (bench.simonmccallum.org.nz)
server {
    listen 80;
    server_name bench.simonmccallum.org.nz;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /static/ {
        alias /opt/llm-bench/web/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}

